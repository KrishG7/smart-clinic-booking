<!DOCTYPE html>

</head>

<aside class="sidebar">
  <div class="sidebar-brand">

<div class="main">

  </header>

</div>

<div class="toast" id="toast"></div>
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-content"></div>
</div>

<script>
const API   = 'http://localhost:3000/api';
const user  = JSON.parse(localStorage.getItem('user') || 'null');
const token = localStorage.getItem('token');
if (!user || !token) window.location.href = 'login.html';

/* ── CLOCK ── */
function tickClock(){
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
}
tickClock(); setInterval(tickClock,1000);

/* ── USER INFO ── */
const roleAva   = {doctor:'🩺',patient:'🧑‍💼',admin:'🛡️',staff:'👤'};
const roleLabel = {doctor:'Doctor',patient:'Patient',admin:'Administrator',staff:'Staff'};
document.getElementById('user-name').textContent = user.name;
document.getElementById('user-role').textContent = roleLabel[user.role] || user.role;
document.getElementById('user-ava').textContent  = roleAva[user.role] || '👤';
document.getElementById('topbar-sub').textContent =
  new Date().toLocaleDateString('en-IN',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

/* ── HELPERS ── */
function showToast(m,t='info'){
  const e=document.getElementById('toast');
  e.textContent=m;e.className=`toast ${t} show`;
  setTimeout(()=>e.classList.remove('show'),4000);
}
function logout(){localStorage.clear();window.location.href='login.html';}
function refreshCurrent(){
  if(user.role==='doctor'||user.role==='staff') loadDoctor();
  else if(user.role==='patient') loadPatient();
  else loadAdmin();
}
function switchSection(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const s=document.getElementById(id); if(s) s.classList.add('active');
  const n=document.querySelector(`[data-section="${id}"]`); if(n) n.classList.add('active');
  const titles={
    's-dash':'Dashboard','s-queue':'Live Queue','s-appts':'Appointments',
    's-patients':'Patients','s-rx':'Prescriptions',
    's-home':'Home','s-myappts':'My Appointments','s-mytoken':'My Token',
    's-history':'Visit History','s-doctors':'Find Doctor','s-book':'Book Appointment','s-profile':'Edit Profile',
    's-admin':'Admin Dashboard','s-pending':'Pending Approvals','s-users':'All Users'
  };
  if(titles[id]) document.getElementById('topbar-title').textContent = titles[id];
}
async function apiFetch(endpoint,opts={}){
  try{
    const res=await fetch(`${API}${endpoint}`,{
      ...opts,
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`,...(opts.headers||{})}
    });
    return await res.json();
  }catch(e){showToast('Connection error','error');return{success:false};}
}
function openModal(html){
  document.getElementById('modal-content').innerHTML=html;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
function greet(){const h=new Date().getHours();return h<12?'Morning':h<17?'Afternoon':'Evening';}
function fmtDate(d){return d?new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}):'—';}
function fmtDay(d){return d?new Date(d).getDate():'?';}
function fmtMon(d){return d?new Date(d).toLocaleDateString('en-IN',{month:'short'}):'—';}
function statusBadge(s){
  const m={
    waiting:'b-waiting',in_progress:'b-progress',completed:'b-done',
    cancelled:'b-cancel',booked:'b-booked',skipped:'b-cancel',
    emergency:'b-emergency',checked_in:'b-checkedin',no_show:'b-cancel'
  };
  const label=(s||'').replace(/_/g,' ');
  return `<span class="badge ${m[s]||'b-booked'}">${label}</span>`;
}
function emptyState(icon,msg,action=''){
  return `<div class="empty-state"><div class="emoji">${icon}</div><p>${msg}${action?` <a href="#" onclick="${action}">Book one!</a>`:''}</p></div>`;
}

async function loadDoctor(){
  // Resolve logged-in doctor's numeric doctor record ID
  const meRes = await apiFetch('/auth/me');
  const doctorUserId = meRes.success ? (meRes.user && meRes.user.id) : null;
  // Get all doctors to find this user's doctor ID
  let myDoctorId = null;
  if(doctorUserId){
    const docsRes = await apiFetch('/doctors');
    if(docsRes.success){
      const myDoc = (docsRes.doctors||[]).find(d=>d.user_id===doctorUserId);
      if(myDoc) myDoctorId = myDoc.id;
    }
  }
  const today_date = new Date().toISOString().split('T')[0];
  const apptRoute  = myDoctorId ? `/appointments/doctor/${myDoctorId}?date=${today_date}` : '/appointments/my';
  const queueRoute = myDoctorId ? `/tokens/queue/${myDoctorId}` : '/tokens/my';
  const [apRes,tRes,pRes]=await Promise.all([
    apiFetch(apptRoute),
    apiFetch(queueRoute),
    apiFetch('/patients')
  ]);
  // store doctorId globally for callNext
  window._doctorId = myDoctorId;

  const appts  = apRes.success?(apRes.appointments||[]):[];
  // /appointments/doctor/:id returns all appointments filtered by date already; keep as-is
  const today  = appts.filter(a=>a.appointment_date&&new Date(a.appointment_date).toDateString()===new Date().toDateString());
  const tokens = tRes.success?(tRes.tokens||tRes.queue||[]):[];
  const waiting= tokens.filter(t=>t.status==='waiting');
  const cur    = tokens.find(t=>t.status==='in_progress') || (tRes.success&&tRes.currentToken?{token_number:tRes.currentToken.tokenNumber,patient_name:tRes.currentToken.patientName,status:'in_progress'}:null);
  const done   = today.filter(a=>a.status==='completed');

  /* ── Stat grid (conditional) ── */
  let statsHtml='';
  statsHtml+=`<div class="kpi kpi-blue anim-up"><div class="kpi-icon">📅</div><div class="kpi-body"><div class="kpi-label">Appointments</div><div class="kpi-value">${today.length}</div><div class="kpi-sub">Today's total</div></div></div>`;
  statsHtml+=`<div class="kpi kpi-green anim-up anim-d1"><div class="kpi-icon">✅</div><div class="kpi-body"><div class="kpi-label">Completed</div><div class="kpi-value">${done.length}</div><div class="kpi-sub">Today</div></div></div>`;
  if(waiting.length>0)
    statsHtml+=`<div class="kpi kpi-yellow anim-up anim-d2"><div class="kpi-icon">⏳</div><div class="kpi-body"><div class="kpi-label">Waiting</div><div class="kpi-value">${waiting.length}</div><div class="kpi-sub">In queue</div></div></div>`;
  if(cur)
    statsHtml+=`<div class="kpi kpi-blue anim-up anim-d3"><div class="kpi-icon">🔵</div><div class="kpi-body"><div class="kpi-label">Now Serving</div><div class="kpi-value">#${cur.token_number}</div><div class="kpi-sub">Active token</div></div></div>`;
  document.getElementById('ds-stats').innerHTML=statsHtml;

  /* ── Date badge ── */
  document.getElementById('ds-date-badge').textContent=new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short'});

  /* ── Today's Schedule ── */
  document.getElementById('ds-sched').innerHTML=today.length
    ?today.slice(0,8).map(a=>{
        const dot=a.status==='in_progress'?'active':a.status==='completed'?'done':'upcoming';
        return `<div class="schedule-item"><div class="sched-time">${a.appointment_time||'—'}</div><div class="sched-dot ${dot}"></div><div class="sched-info"><div class="sched-name">${a.patient_name||'Patient'}</div><div class="sched-type">${(a.type||'regular').replace('_',' ')} · ${a.reason||'General'}</div></div><div class="sched-badge">${statusBadge(a.status)}</div></div>`;
      }).join('')
    :emptyState('📋','No appointments today.');

  /* ── Full appointments table ── */
  const tbl=(rows,cols,fn)=>rows.length
    ?`<table><thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead><tbody>${rows.map(fn).join('')}</tbody></table>`
    :emptyState('📋','Nothing here yet.');
  document.getElementById('d-appts-full').innerHTML=tbl(today,
    ['Token','Patient','Time','Type','Reason','Status'],
    a=>`<tr><td><b>#${a.token_no||'—'}</b></td><td>${a.patient_name||'Patient'}</td><td>${a.appointment_time||'—'}</td><td>${a.type||'regular'}</td><td>${a.reason||'—'}</td><td>${statusBadge(a.status)}</td></tr>`);

  /* ── Now Serving display ── */
  if(cur){
    document.getElementById('ds-q-num').textContent=`#${cur.token_number}`;
    document.getElementById('ds-q-name').textContent=cur.patient_name||'Patient';
    document.getElementById('q-num').textContent=`#${cur.token_number}`;
    document.getElementById('q-name').textContent=cur.patient_name||'Patient';
  } else {
    document.getElementById('ds-q-num').textContent='—';
    document.getElementById('ds-q-name').textContent='Queue is clear';
    document.getElementById('q-num').textContent='—';
    document.getElementById('q-name').textContent='No patient';
  }

  /* ── Queue list ── */
  const qHtml=waiting.length
    ?waiting.map((t,i)=>{
        const isFirst=i===0;
        const emergency=t.type==='emergency';
        const rowCls=isFirst?'queue-row queue-row-serving':'queue-row';
        return `<div class="${rowCls}">${isFirst?'<span style="font-size:10px;font-weight:700;color:var(--brand-600);margin-right:2px">▶</span>':''}<div class="q-token">#${t.token_number}</div><div class="q-name">${t.patient_name||'Patient'}</div><div class="q-wait">${t.estimated_wait_minutes||0}m wait</div>${statusBadge(emergency?'emergency':t.type||'regular')}</div>`;
      }).join('')
    :emptyState('🎉','Queue is clear — all caught up!');
  document.getElementById('ds-q-list').innerHTML=qHtml;
  document.getElementById('q-list').innerHTML=qHtml;

  /* ── Patients table ── */
  const patients=pRes.success?(pRes.patients||[]):[];
  document.getElementById('d-patients').innerHTML=tbl(patients,
    ['Name','Phone','Gender','Blood Group'],
    p=>`<tr><td>${p.name||'—'}</td><td>${p.phone||'—'}</td><td>${p.gender||'—'}</td><td>${p.blood_group||'—'}</td></tr>`);
}

async function callNext(){const r=await apiFetch('/tokens/next',{method:'POST',body:JSON.stringify({doctorId:window._doctorId})});showToast(r.success?'Next patient called!':r.message||'Failed',r.success?'success':'error');loadDoctor();}
async function emerInt(){showToast('Emergency interrupt ready','info');}
async function skipCur(){showToast('Skip feature ready','info');}

async function loadPatient(){
  const [apRes,tRes]=await Promise.all([apiFetch('/appointments/my'),apiFetch('/tokens/my')]);
  const appts   =apRes.success?(apRes.appointments||[]):[];
  const upcoming=appts.filter(a=>['booked','checked_in'].includes(a.status));
  const history =appts.filter(a=>['completed','cancelled','no_show'].includes(a.status));

  /* ── Stats (conditional) ── */
  const tData=tRes.success?(tRes.tokens||tRes.token||tRes):null;
  const myT  =Array.isArray(tData)?tData[0]:tData;
  let statsHtml='';
  if(myT&&myT.token_number){
    statsHtml+=`<div class="kpi kpi-green anim-up"><div class="kpi-icon">🎫</div><div class="kpi-body"><div class="kpi-label">My Token</div><div class="kpi-value">#${myT.token_number}</div><div class="kpi-sub">Today</div></div></div>`;
    statsHtml+=`<div class="kpi kpi-blue anim-up anim-d1"><div class="kpi-icon">📍</div><div class="kpi-body"><div class="kpi-label">Queue Position</div><div class="kpi-value">${myT.queue_position||'—'}</div><div class="kpi-sub">In line</div></div></div>`;
    statsHtml+=`<div class="kpi kpi-yellow anim-up anim-d2"><div class="kpi-icon">⏱️</div><div class="kpi-body"><div class="kpi-label">Est. Wait</div><div class="kpi-value">${myT.estimated_wait_minutes||0}m</div><div class="kpi-sub">Minutes</div></div></div>`;
  }
  if(upcoming.length>0)
    statsHtml+=`<div class="kpi kpi-purple anim-up anim-d3"><div class="kpi-icon">📅</div><div class="kpi-body"><div class="kpi-label">Upcoming</div><div class="kpi-value">${upcoming.length}</div><div class="kpi-sub">Appointments</div></div></div>`;
  document.getElementById('ps-stats').innerHTML=statsHtml||`<div class="kpi kpi-blue anim-up" style="grid-column:1/-1"><div class="kpi-icon">👋</div><div class="kpi-body"><div class="kpi-label">Welcome</div><div class="kpi-value" style="font-size:18px">${user.name.split(' ')[0]}</div><div class="kpi-sub">No active tokens today</div></div></div>`;

  /* ── Upcoming appointments ── */
  document.getElementById('ps-upcoming').innerHTML=upcoming.length
    ?upcoming.slice(0,5).map(a=>`<div class="appt-card"><div class="appt-cal"><div class="ac-day">${fmtDay(a.appointment_date)}</div><div class="ac-mon">${fmtMon(a.appointment_date)}</div></div><div class="appt-info"><div class="appt-doc">${a.doctor_name||'Doctor'}</div><div class="appt-meta">🕐 ${a.appointment_time||'—'} &nbsp;·&nbsp; 🎫 #${a.token_no||'—'}</div></div><div class="appt-right">${statusBadge(a.status)}</div></div>`).join('')
    :emptyState('📅','No upcoming appointments.','switchSection(\'s-book\');loadBooking()');

  /* ── All appointments & history tables ── */
  const tbl=(rows,cols,fn)=>rows.length
    ?`<table><thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead><tbody>${rows.map(fn).join('')}</tbody></table>`
    :emptyState('📋','No records yet.');
  document.getElementById('p-appts-all').innerHTML=tbl(appts,
    ['Date','Time','Doctor','Reason','Status','Action'],
    a=>`<tr><td>${fmtDate(a.appointment_date)}</td><td>${a.appointment_time||'—'}</td><td>${a.doctor_name||'—'}</td><td>${a.reason||'—'}</td><td>${statusBadge(a.status)}</td><td>${a.status==='booked'?`<button class="btn-reject" style="font-size:11px;padding:4px 10px" onclick="cancelAppt(${a.id})">Cancel</button>`:''}</td></tr>`);
  document.getElementById('p-history').innerHTML=tbl(history,
    ['Date','Doctor','Reason','Status'],
    a=>`<tr><td>${fmtDate(a.appointment_date)}</td><td>${a.doctor_name||'—'}</td><td>${a.reason||'—'}</td><td>${statusBadge(a.status)}</td></tr>`);

  /* ── Token / Queue status ── */
  if(myT&&myT.token_number){
    const pos=myT.queue_position||1, total=Math.max(pos,1);
    const pct=Math.max(0,Math.min(1,(total-pos+1)/total));
    const circ=163, offset=Math.round(circ*(1-pct));
    const statusMsg=myT.status==='in_progress'?'🎉 It\'s your turn!':myT.status==='waiting'?`Position ${myT.queue_position||'—'} in queue`:'—';

    const banner=`
      <div class="queue-status-banner">
        <div class="qsb-ring">
          <svg width="68" height="68" viewBox="0 0 68 68">
            <circle class="qsb-circle-bg" cx="34" cy="34" r="26"/>
            <circle class="qsb-circle-fg" cx="34" cy="34" r="26" style="stroke-dashoffset:${offset}"/>
          </svg>
          <div class="qsb-num">Q<span>${myT.queue_position||'—'}</span></div>
        </div>
        <div class="qsb-info">
          <h3>${statusMsg}</h3>
          <p>Token #${myT.token_number} · Est. wait: ${myT.estimated_wait_minutes||0} min</p>
        </div>
      </div>`;
    document.getElementById('ps-token-card').innerHTML=banner;

    document.getElementById('p-token-full').innerHTML=`
      <div class="token-big">
        <div class="label">Your Token</div>
        <div class="number">#${myT.token_number}</div>
        <div class="sub">${statusMsg}</div>
      </div>`;

    document.getElementById('p-queue-info').innerHTML=`
      <div class="q-info-row"><span class="q-info-label">📍 Queue Position</span><span class="q-info-value blue">${myT.queue_position||'—'}</span></div>
      <div class="q-info-row"><span class="q-info-label">⏱ Estimated Wait</span><span class="q-info-value amber">${myT.estimated_wait_minutes||0} min</span></div>
      <div class="q-info-row"><span class="q-info-label">🏥 Status</span>${statusBadge(myT.status)}</div>`;
  } else {
    document.getElementById('ps-token-card').innerHTML=emptyState('🎫','No active token today.');
    document.getElementById('p-token-full').innerHTML=emptyState('🎫','No active token today.');
    document.getElementById('p-queue-info').innerHTML=emptyState('📊','No queue data available.');
  }

  /* ── Profile form ── */
  document.getElementById('profile-edit').innerHTML=`
    <div class="profile-card">
      <div class="profile-row">
        <div class="form-group"><label>Full Name</label><input id="pe-name" value="${user.name}"></div>
        <div class="form-group"><label>Phone</label><input id="pe-phone" value="${user.phone}" disabled></div>
      </div>
      <div class="profile-row">
        <div class="form-group"><label>Email</label><input id="pe-email" value="${user.email||''}"></div>
      </div>
      <button class="btn btn-primary" style="width:auto;padding:10px 24px;margin-top:8px" onclick="saveProfile()">💾 Save Changes</button>
    </div>`;
}

let allDoctors=[];
async function loadDoctors(){
  const res=await apiFetch('/doctors');
  allDoctors=res.success?(res.doctors||[]):[];
  const specRes=await apiFetch('/doctors/specializations');
  const specs=specRes.success?(specRes.specializations||[]):[];
  const sel=document.getElementById('doc-filter');
  if(!sel)return;
  sel.innerHTML='<option value="">All Specializations</option>'+specs.map(s=>`<option>${s}</option>`).join('');
  renderDoctorCards(allDoctors);
}
function filterDoctors(){
  const q=(document.getElementById('doc-search').value||'').toLowerCase();
  const spec=document.getElementById('doc-filter').value;
  renderDoctorCards(allDoctors.filter(d=>(!q||(d.name||'').toLowerCase().includes(q))&&(!spec||d.specialization===spec)));
}
const avatars=['👨‍⚕️','👩‍⚕️','🧑‍⚕️','👨‍🔬','👩‍🔬'];
function renderDoctorCards(docs){
  const grid=document.getElementById('doc-grid');if(!grid)return;
  grid.innerHTML=docs.length
    ?docs.map((d,i)=>`<div class="doctor-card anim-up" style="animation-delay:${i*0.04}s"><div class="dc-header"><div class="dc-ava">${avatars[i%avatars.length]}</div><div class="dc-info"><h3>${d.name||'Doctor'}</h3><div class="dc-spec">${d.specialization||'General Medicine'}</div><div class="dc-qual">${d.qualification||''}</div></div></div><div class="dc-meta"><span>⭐ ${(4+Math.random()).toFixed(1)}</span><span>📅 ${d.experience_years||0} yrs</span><span>👥 ${d.max_patients_per_day||30}/day</span></div><div class="dc-footer"><div class="dc-fee">₹${d.consultation_fee||500}</div><button class="btn-book" onclick="openBookingModal(${d.id},'${(d.name||'Doctor').replace(/'/g,"\\'")}','${d.specialization||''}')">Book Appointment</button></div></div>`).join('')
    :`<div class="empty-state" style="grid-column:1/-1">${emptyState('🩺','No doctors found.')}</div>`;
}
function openBookingModal(docId,docName,spec){
  const tomorrow=new Date();tomorrow.setDate(tomorrow.getDate()+1);
  openModal(`<h3>Book Appointment</h3><p class="sub">with ${docName} — ${spec}</p>
    <div class="form-group"><label>Date</label><input type="date" id="bk-date" min="${tomorrow.toISOString().split('T')[0]}" required></div>
    <div class="form-group"><label>Preferred Time</label><select id="bk-time"><option>09:00:00</option><option>09:30:00</option><option>10:00:00</option><option>10:30:00</option><option>11:00:00</option><option>11:30:00</option><option>12:00:00</option><option>14:00:00</option><option>14:30:00</option><option>15:00:00</option><option>15:30:00</option><option>16:00:00</option></select></div>
    <div class="form-group"><label>Type</label><select id="bk-type"><option value="regular">Regular</option><option value="follow_up">Follow-up</option><option value="emergency">Emergency</option></select></div>
    <div class="form-group"><label>Reason / Symptoms</label><textarea id="bk-reason" placeholder="Describe your symptoms…"></textarea></div>
    <div class="modal-actions"><button class="btn-cancel-m" onclick="closeModal()">Cancel</button><button class="btn-primary-m" onclick="submitBooking(${docId})">Confirm Booking</button></div>`);
}
async function submitBooking(docId){
  const body={doctorId:docId,appointmentDate:document.getElementById('bk-date').value,appointmentTime:document.getElementById('bk-time').value,type:document.getElementById('bk-type').value,reason:document.getElementById('bk-reason').value};
  if(!body.appointmentDate)return showToast('Please select a date','error');
  const res=await apiFetch('/appointments',{method:'POST',body:JSON.stringify(body)});
  if(res.success){closeModal();showToast(`Booked! Token #${res.token?.tokenNumber||'—'}`,'success');loadPatient();}
  else showToast(res.message||'Booking failed','error');
}
async function cancelAppt(id){if(!confirm('Cancel this appointment?'))return;const r=await apiFetch(`/appointments/${id}`,{method:'DELETE'});showToast(r.success?'Cancelled':'Failed',r.success?'success':'error');loadPatient();}
async function loadBooking(){await loadDoctors();const bf=document.getElementById('booking-form');if(bf)bf.innerHTML=`<p style="font-size:14px;color:var(--text-2);margin-bottom:16px">Select a doctor from <a href="#" onclick="switchSection('s-doctors');loadDoctors()">Find Doctor</a> and click <b>Book Appointment</b>.</p>`+(document.getElementById('doc-grid')?document.getElementById('doc-grid').innerHTML:'');}
async function saveProfile(){showToast('Profile saved!','success');user.name=document.getElementById('pe-name').value;user.email=document.getElementById('pe-email').value;localStorage.setItem('user',JSON.stringify(user));document.getElementById('user-name').textContent=user.name;}

/* ═══════════════════════════════════════════
   ADMIN DASHBOARD
═══════════════════════════════════════════ */
function renderAdminDashboard(){
  document.getElementById('sidebar-nav').innerHTML=`
    <div class="nav-section">Administration</div>
    <button class="nav-item active" data-section="s-admin"   onclick="switchSection('s-admin')"><span class="ni">📊</span> Dashboard</button>
    <button class="nav-item" data-section="s-pending"        onclick="switchSection('s-pending');loadPending()"><span class="ni">⏳</span> Pending Approvals <span class="nav-badge" id="pending-count">0</span></button>
    <button class="nav-item" data-section="s-users"          onclick="switchSection('s-users');loadUsers()"><span class="ni">👥</span> All Users</button>
  `;
  document.getElementById('topbar-title').textContent=`Good ${greet()}, Admin`;
  document.getElementById('main-content').innerHTML=`
    <div class="section active" id="s-admin">
      <div class="stats-grid anim-up" id="admin-stats"></div>
      <div class="dash-grid">
        <div class="card anim-up anim-d2">
          <div class="card-head"><span class="card-title">⏳ Pending Doctor Approvals</span></div>
          <div class="card-body" id="admin-pending-mini"></div>
        </div>
        <div class="card anim-up anim-d3">
          <div class="card-head"><span class="card-title">👥 Recent Users</span></div>
          <div class="card-body-flush table-wrap" id="admin-users-mini"></div>
        </div>
      </div>
    </div>

    <div class="section" id="s-pending">
      <div class="page-header"><h1>Pending Approvals</h1><p>Doctor accounts awaiting approval</p></div>
      <div class="card"><div class="card-body" id="pending-list"></div></div>
    </div>

    <div class="section" id="s-users">
      <div class="page-header"><h1>All Users</h1><p>Manage system users</p></div>
      <div class="card"><div class="card-body-flush table-wrap" id="users-list"></div></div>
    </div>
  `;
  loadAdmin();
}

async function loadAdmin(){
  const [stRes,pdRes,usRes]=await Promise.all([
    apiFetch('/auth/admin/stats'),
    apiFetch('/auth/admin/pending-doctors'),
    apiFetch('/auth/admin/users')
  ]);
  const st=stRes.success?(stRes.stats||stRes):{};

  /* ── Conditional KPI cards ── */
  let statsHtml='';
  if((st.totalPatients||0)>0)
    statsHtml+=`<div class="kpi kpi-blue anim-up"><div class="kpi-icon">🧑‍💼</div><div class="kpi-body"><div class="kpi-label">Total Patients</div><div class="kpi-value">${st.totalPatients}</div><div class="kpi-sub">Registered</div></div></div>`;
  if((st.totalDoctors||0)>0)
    statsHtml+=`<div class="kpi kpi-green anim-up anim-d1"><div class="kpi-icon">🩺</div><div class="kpi-body"><div class="kpi-label">Approved Doctors</div><div class="kpi-value">${st.totalDoctors}</div><div class="kpi-sub">Active</div></div></div>`;
  if((st.pendingDoctors||0)>0)
    statsHtml+=`<div class="kpi kpi-yellow anim-up anim-d2"><div class="kpi-icon">⏳</div><div class="kpi-body"><div class="kpi-label">Pending Doctors</div><div class="kpi-value">${st.pendingDoctors}</div><div class="kpi-sub">Awaiting approval</div></div></div>`;
  if((st.todayAppointments||0)>0)
    statsHtml+=`<div class="kpi kpi-purple anim-up anim-d3"><div class="kpi-icon">📅</div><div class="kpi-body"><div class="kpi-label">Today's Appts</div><div class="kpi-value">${st.todayAppointments}</div><div class="kpi-sub">Today</div></div></div>`;
  if((st.totalAppointments||0)>0)
    statsHtml+=`<div class="kpi kpi-orange anim-up anim-d4"><div class="kpi-icon">📊</div><div class="kpi-body"><div class="kpi-label">Total Appointments</div><div class="kpi-value">${st.totalAppointments}</div><div class="kpi-sub">All time</div></div></div>`;
  if(!statsHtml)
    statsHtml=`<div class="kpi kpi-blue anim-up" style="grid-column:1/-1"><div class="kpi-icon">🏥</div><div class="kpi-body"><div class="kpi-label">System</div><div class="kpi-value" style="font-size:18px">Getting started</div><div class="kpi-sub">No data yet — approve doctors to begin</div></div></div>`;
  document.getElementById('admin-stats').innerHTML=statsHtml;

  const cnt=document.getElementById('pending-count');
  if(cnt) cnt.textContent=st.pendingDoctors||0;

  /* ── Pending approvals ── */
  const pending=pdRes.success?(pdRes.doctors||[]):[];
  const pendingHtml=pending.length
    ?pending.map(d=>`<div class="approval-card"><div class="approval-info"><h4>${d.name} — ${d.specialization||'General'}</h4><p>📱 ${d.phone} | 📚 ${d.qualification||'—'} | ${d.experience_years||0} yrs | ₹${d.consultation_fee||500}</p></div><div class="approval-actions"><button class="btn-approve" onclick="approveDoc(${d.id})">✓ Approve</button><button class="btn-reject" onclick="rejectDoc(${d.id})">✗ Reject</button></div></div>`).join('')
    :emptyState('✅','No pending approvals — all caught up!');
  document.getElementById('admin-pending-mini').innerHTML=pendingHtml;

  /* ── Recent users ── */
  const users=usRes.success?(usRes.users||[]):[];
  document.getElementById('admin-users-mini').innerHTML=users.length
    ?`<table><thead><tr><th>Name</th><th>Phone</th><th>Role</th><th>Status</th><th>Joined</th></tr></thead><tbody>${users.slice(0,10).map(u=>`<tr><td>${u.name}</td><td>${u.phone}</td><td><span class="badge b-booked">${u.role}</span></td><td>${u.is_active?'<span class="badge b-done">Active</span>':'<span class="badge b-waiting">Pending</span>'}</td><td>${fmtDate(u.created_at)}</td></tr>`).join('')}</tbody></table>`
    :emptyState('👥','No users yet.');
}

async function loadPending(){
  const res=await apiFetch('/auth/admin/pending-doctors');
  const pending=res.success?(res.doctors||[]):[];
  document.getElementById('pending-list').innerHTML=pending.length
    ?pending.map(d=>`<div class="approval-card"><div class="approval-info"><h4>${d.name} — ${d.specialization||'General'}</h4><p>📱 ${d.phone} | 📧 ${d.email||'—'} | 📚 ${d.qualification||'—'} | ${d.experience_years||0} yrs | ₹${d.consultation_fee||500}</p></div><div class="approval-actions"><button class="btn-approve" onclick="approveDoc(${d.id})">✓ Approve</button><button class="btn-reject" onclick="rejectDoc(${d.id})">✗ Reject</button></div></div>`).join('')
    :emptyState('✅','All caught up! No pending approvals.');
}
async function loadUsers(){
  const res=await apiFetch('/auth/admin/users');
  const users=res.success?(res.users||[]):[];
  document.getElementById('users-list').innerHTML=users.length
    ?`<table><thead><tr><th>ID</th><th>Name</th><th>Phone</th><th>Email</th><th>Role</th><th>Status</th><th>Joined</th></tr></thead><tbody>${users.map(u=>`<tr><td>${u.id}</td><td>${u.name}</td><td>${u.phone}</td><td>${u.email||'—'}</td><td><span class="badge b-booked">${u.role}</span></td><td>${u.is_active?'<span class="badge b-done">Active</span>':'<span class="badge b-waiting">Pending</span>'}</td><td>${fmtDate(u.created_at)}</td></tr>`).join('')}</tbody></table>`
    :emptyState('👥','No users yet.');
}
async function approveDoc(uid){const r=await apiFetch(`/auth/admin/approve-doctor/${uid}`,{method:'PUT'});showToast(r.success?'Doctor approved!':'Failed',r.success?'success':'error');loadAdmin();loadPending();}
async function rejectDoc(uid){if(!confirm('Reject this doctor?'))return;const r=await apiFetch(`/auth/admin/reject-doctor/${uid}`,{method:'DELETE'});showToast(r.success?'Doctor rejected':'Failed',r.success?'success':'error');loadAdmin();loadPending();}

/* ── INIT ── */
if     (user.role==='admin')               renderAdminDashboard();
else if(user.role==='doctor'||user.role==='staff') renderDoctorDashboard();
else                                        renderPatientDashboard();
</script>
</body>
</html>
